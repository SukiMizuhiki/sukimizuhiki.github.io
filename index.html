<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Suki Mizuhiki | Advanced Portfolio">
    <title>Suki Mizuhiki | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-roboto" id="main-body">
    <!-- Navbar -->
    <header class="bg-gray-900 text-white p-4 fixed w-full top-0 z-10">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Suki Mizuhiki</h1>
            <ul class="flex space-x-6">
                <li><a href="#projects" class="hover:text-gray-400">Projects</a></li>
                <li><a href="#about" class="hover:text-gray-400">About</a></li>
                <li><a href="#skills" class="hover:text-gray-400">Skills</a></li>
                <li><a href="#blog" class="hover:text-gray-400">Blog</a></li>
                <li><button id="login-btn" class="bg-blue-500 py-2 px-4 rounded">Login</button></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center items-center bg-cover bg-center relative" id="hero">
        <h2 class="text-5xl font-bold text-white mb-4">Hi, I'm Suki Mizuhiki</h2>
        <p class="text-2xl text-gray-200 mb-4">I build engaging, interactive experiences</p>
        <a href="#projects" class="mt-8 bg-blue-500 hover:bg-blue-600 text-white py-2 px-6 rounded-full">Explore My Work</a>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="p-10 bg-gray-100">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-6">Projects</h2>
            <div id="project-gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Projects loaded dynamically from Firestore -->
            </div>
        </div>
    </section>

    <!-- Blog Section -->
    <section id="blog" class="p-10 bg-gray-100">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-6">Blog</h2>
            <div id="blog-posts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Blog posts loaded dynamically from Firestore -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center py-6">
        <p>&copy; 2024 Suki Mizuhiki. All rights reserved.</p>
    </footer>

    <!-- Firebase Scripts -->
    <script src="script.js"></script>
</body>
</html>
