<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Suki Mizuhiki - Developer Portfolio">
    <title>Suki Mizuhiki | Developer Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
</head>
<body class="bg-white text-black transition-colors duration-300" id="main-body">
    <!-- Navbar -->
    <header class="bg-gray-900 text-white p-4 fixed w-full top-0 z-10">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Suki Mizuhiki</h1>
            <ul class="flex space-x-6">
                <li><a href="#projects" class="hover:text-gray-400">Projects</a></li>
                <li><a href="#skills" class="hover:text-gray-400">Skills</a></li>
                <li><a href="#contact" class="hover:text-gray-400">Contact</a></li>
                <li><button id="dark-mode-toggle" class="bg-blue-500 py-2 px-4 rounded">Dark Mode</button></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center items-center bg-gray-800 text-white text-center" id="hero">
        <h2 class="text-5xl font-bold mb-4">Hi, I'm Suki Mizuhiki</h2>
        <p class="text-2xl mb-8">I build engaging and interactive experiences.</p>
        <a href="#projects" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-6 rounded-full">Explore My Work</a>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="p-10 bg-gray-100">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-6">Projects</h2>
            <div id="project-gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Projects will be dynamically loaded from Firestore -->
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="p-10 bg-white">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-6">Skills</h2>
            <ul class="list-disc pl-5 text-lg">
                <li>JavaScript</li>
                <li>React.js</li>
                <li>Node.js</li>
                <li>Firebase</li>
                <li>CSS/HTML</li>
            </ul>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="p-10 bg-gray-100">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-6">Contact Me</h2>
            <form id="contact-form" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium">Name</label>
                    <input type="text" id="name" name="name" class="w-full p-2 border border-gray-300 rounded" required>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium">Email</label>
                    <input type="email" id="email" name="email" class="w-full p-2 border border-gray-300 rounded" required>
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium">Message</label>
                    <textarea id="message" name="message" class="w-full p-2 border border-gray-300 rounded" rows="4" required></textarea>
                </div>
                <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center py-6">
        <p>&copy; 2024 Suki Mizuhiki. All rights reserved.</p>
    </footer>

    <!-- Firebase and Custom Scripts -->
    <script src="script.js"></script>
</body>
</html>
